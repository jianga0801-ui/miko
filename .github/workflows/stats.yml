name: stats

on:
  # Manual-only: disabled the daily cron so this fork does not auto-commit
  # download stats. Run from the Actions tab if wanted.
  workflow_dispatch: # Allow manual trigger

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  stats:
    if: github.repository == 'jianga0801-ui/miko'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run stats script
        run: bun script/stats.ts

      - name: Commit stats
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add STATS.md
          git diff --staged --quiet || git commit -m "ignore: update download stats $(date -I)"
          git push
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
