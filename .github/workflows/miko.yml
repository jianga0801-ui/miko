name: miko

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  miko:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /miko') ||
      startsWith(github.event.comment.body, '/miko')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-bun

      - name: Run miko
        uses: anomalyco/miko/github@2c14fc5586fe0b88e5c04732d2e846769cc35671 # latest
        env:
          MIKO_API_KEY: ${{ secrets.MIKO_API_KEY }}
          MIKO_PERMISSION: '{"bash": "deny"}'
        with:
          model: miko/claude-opus-4-5
